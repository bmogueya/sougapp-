<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SougApp — Plateforme multi-services en Mauritanie. Food delivery, grocery, marketplace, pharmacie et plus." />
    <meta property="og:title" content="SougApp — Console" />
    <meta property="og:description" content="Plateforme multi-services en Mauritanie" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sougapp.vercel.app" />
    <meta name="theme-color" content="#0E7C66" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SougApp — Console</title>
    <!-- Google Fonts: IBM Plex Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap"
      rel="stylesheet"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
    </noscript>
    <script>
      // Anti-flash dark mode
      (function() {
        var theme = localStorage.getItem('sougapp-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
